<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script>
        (function () {
            const saved = localStorage.getItem("color-scheme");
            const theme = saved ? saved : window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
            document.querySelector('meta[name="color-scheme"]').content = theme;
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <title>Interactive Quiz</title>
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center p-3"
    style="background-color: var(--bg-surface);">
    <!-- Main Quiz Container -->
    <main class="shadow-sm border-0" id="quiz-container"
          style="width: 100%; max-width: 560px; overflow: hidden; display:none;">

        <!-- Progress bar (hidden on setup screen, shown once quiz starts) -->
        <div class="progress" id="progress-wrap" style="height: 6px; border-radius: 0; display:none;">
            <div class="progress-bar" id="progress-bar" role="progressbar"
                style="width: 0%; background-color: var(--primary);" aria-valuenow="0" aria-valuemin="0"
                aria-valuemax="100">
            </div>
        </div>

        <div class="card p-4">

            <!-- ============================================================ -->
            <!-- SETUP PANEL                                                   -->
            <!-- ============================================================ -->
            <div id="setup-panel" style="display: block;">

                <h2 class="fs-5 fw-bold mb-1">Build your quiz</h2>
                <p class="text-muted small mb-4">Questions are fetched live from OpenTDB — pick a topic to get started.</p>

                <label class="form-label small fw-medium">Topic</label>
                <div id="topic-grid" class="row g-2 mb-4"></div>

                <div class="row g-2 mb-4">
                    <div class="col-6">
                        <label for="difficulty-select" class="form-label small fw-medium">Difficulty</label>
                        <select id="difficulty-select" class="form-select form-select-sm">
                            <option value="easy" selected>Easy</option>
                            <option value="medium">Medium</option>
                            <option value="hard">Hard</option>
                            <option value="">Any</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label for="count-select" class="form-label small fw-medium">Questions</label>
                        <select id="count-select" class="form-select form-select-sm">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="15">15</option>
                            <option value="20">20</option>
                        </select>
                    </div>
                </div>

                <div id="setup-error" class="alert alert-danger small py-2 px-3 mb-3" style="display:none;"></div>

                <div class="d-flex justify-content-between align-items-center">
                    <a href="https://dev-agency-liart-five.vercel.app/" class="btn btn-outline-secondary btn-sm">&larr; Back to Portfolio</a>
                    <button id="start-quiz-btn" class="btn btn-primary fw-medium" disabled>Start Quiz</button>
                </div>
            </div>

            <!-- ============================================================ -->
            <!-- LOADING PANEL                                                 -->
            <!-- ============================================================ -->
            <div id="loading-panel" class="text-center py-5" style="display: none;">
                <div class="spinner-border" role="status" style="color: var(--primary);"></div>
                <p class="small text-muted mt-3 mb-0">Fetching questions&hellip;</p>
            </div>

            <!-- ============================================================ -->
            <!-- QUIZ PANEL                                                    -->
            <!-- ============================================================ -->
            <div id="quiz-panel" style="display: none;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span id="question-counter" class="text-muted small fw-medium">Q 1 of 5</span>
                    <span id="timer-display" class="small fw-medium" style="color: var(--primary);">--s</span>
                </div>
                <h2 id="question-text" class="fs-5 fw-bold mb-4">Loading question...</h2>
                <div id="options-container" class="d-grid gap-2 mb-4"></div>
                <div class="d-flex justify-content-between align-items-center">
                    <button id="quit-btn" class="btn btn-outline-secondary btn-sm">&larr; End Quiz</button>
                    <button id="next-btn" class="btn btn-primary d-none fw-medium">Next Question</button>
                </div>
            </div>
        </div>

        <!-- ============================================================ -->
        <!-- RESULTS PANEL                                                 -->
        <!-- ============================================================ -->
        <div id="results-panel" style="display: none;">

            <!-- Score hero -->
            <div id="results-hero">
                <!-- Ring injected by JS via updateScoreRing() -->
                <div class="score-ring" id="score-ring" style="--pct: 0%;">
                    <span class="score-ring-label"><span id="score-percent">0</span>%</span>
                </div>

                <div id="result-emoji" style="font-size: 2rem; line-height: 1; margin-bottom: 0.25rem;">🎉</div>
                <p id="score-text" class="fw-semibold mb-0" style="font-size: 0.95rem;"></p>

                <!-- Correct / Wrong / Skipped pills — filled by JS -->
                <div class="stat-pills" id="stat-pills"></div>
            </div>

            <!-- Scrollable question breakdown -->
            <div id="results-breakdown-wrap">
                <p class="text-muted small fw-semibold mb-2" style="letter-spacing:0.04em; text-transform:uppercase; font-size:0.7rem;">
                    Question breakdown
                </p>
                <ul id="score-breakdown" class="list-unstyled mb-0"></ul>
            </div>

            <!-- Sticky action bar -->
            <div id="results-actions">
                <button id="new-topic-btn" class="btn btn-outline-secondary btn-sm px-3">Pick new topic</button>
                <button id="retry-btn" class="btn btn-primary btn-sm px-3">Try again</button>
            </div>

        </div><!-- /results-panel -->

    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
